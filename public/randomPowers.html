<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smallville City</title>

    <link rel="icon"
        href="https://images.seeklogo.com/logo-png/16/2/3-colors-superman-logo-png_seeklogo-169352.png"
        type="image">

    <link rel="stylesheet" href="css/styleRandom.css">
</head>

<body>

    <section class="title">
       <img width="50%" src="imagem_sorteio.png">
    </section>

    <section class="content">
        <p>
            O Superman possui os seguintes super-poderes:
            <br><br>

            1 - Voo <br>
            2 - Super força <br>
            3 - Super velocidade <br>
            4 - Sopro de gelo <br>
            5 - Visão raio laser
        </p>
    </section>

    <section class="button">
        <p>Sorteie seu poder!</p>

        <button onclick="random()">Sortear</button>

        <div id="div_randomPower"></div>
    </section>

</body>
</html>

<script>
    function random() {

        let power = [
            'Voo',
            'Super força',
            'Super velocidade',
            'Sopro de gelo',
            'Visão raio laser'
        ];

        let sorteio = Math.floor(Math.random() * power.length);

        div_randomPower.innerHTML =
            `Seu poder sorteado foi: <b>${power[sorteio]}</b>`;
    }
</script>
